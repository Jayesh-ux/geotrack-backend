services:
  - type: web
    name: geotrack-backend
    env: node
    plan: free
    buildCommand: "npm install"
    # Run migrations and seeding before starting the server
    startCommand: "node scripts/runMigration.js && node utils/seedPincodes.js && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geotrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: LICENSE_WEBHOOK_SECRET
        sync: false
      - key: MIDDLEWARE_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: geotrack-db
    databaseName: geotrackdb
    user: geotrackdb_user
    plan: free
    postgresMajorVersion: 15
