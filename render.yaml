services:
  - type: web
    name: geotrack-backend
    env: node
    plan: free
    buildCommand: "npm install"
    # Temporarily simplify for debugging
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geotrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: geotrack-db
    databaseName: geotrackdb
    user: geotrackdb_user
    plan: free
    postgresMajorVersion: 15
